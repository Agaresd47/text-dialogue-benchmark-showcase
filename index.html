    <script id="framework-zh-data" type="application/json">{"site": {"title": "中文文本对话评测项目", "description": "中文文本对话评测项目的双语展示首页，概览项目背景、方法设计、核心案例、模型结论与材料入口。", "toggleButton": {"zh": "EN", "en": "中"}}, "project": {"eyebrow": "中文文本对话评测项目", "title": "从真实长对话中蒸馏出一套可复用的中文对话 benchmark", "oneLiner": "项目从长期积累的真实中文长对话中筛选高价值片段，整理为可重复测试的评测案例，并结合统一 rubric 与多评审敏感性检验，比对不同模型在对话策略层面的差异。", "targetAudience": "适用于中文大模型训练、评测与对话产品团队", "vision": "在已有长对话数据的基础上，本方法可以继续扩展为一条评测流水线，包括自动切分、候选筛选、短测与长测构造，以及基于错误分类的自动诊断。", "personaTitle": "核心结论", "personaText": "当前结果表明，三家模型的差异主要不在表层表达风格，而在于是否能准确判断用户当下需要怎样的回应方式，包括承接姿态、推进与收束时机、边界感，以及关系连续性的处理。与此同时，不同评审模型对理想回复的偏好也会显著影响排序，因此更值得关注的是模型在不同用户状态下的策略适配能力。"}, "stats": {"heroChips": [{"label": "核心案例", "key": "core_cases"}, {"label": "完整案例", "key": "full_cases"}, {"label": "评测结果", "key": "results"}], "cards": [{"label": "核心案例", "key": "core_cases"}, {"label": "完整案例", "key": "full_cases"}, {"label": "模型数量", "key": "models"}, {"label": "评测结果", "key": "results"}]}, "intro": {"cards": [{"eyebrow": "问题定义", "title": "长语境中文对话需要动态交互策略，而非表面措辞", "body": "本项目关注的不是事实性问答中的知识错误，而是中文连续对话中的策略性失误，例如是否识别出隐性需求、选对回应姿态、适时张弛有度，以及维持了关系连续性。这类问题通常依附于长对话语境，难以通过单轮提问稳定暴露。"}, {"eyebrow": "方法设计", "title": "从真实长对话压缩出一套小而高信号的 benchmark", "body": "项目以上游长期积累的真实长对话为研究池，经候选压缩与案例筛选，构造出 16 条正式评测案例，并按 4 类典型用户状态组织。评测部分采用统一 rubric 与错误分类框架，用于比较不同模型在中文对话行为层面的稳定差异。"}, {"eyebrow": "主要发现", "title": "模型差异集中体现在回应策略与风格切换能力", "body": "当前结果显示，三家模型在承接方式、解释倾向、边界感、推进强度与收束时机上存在稳定差异。补充的多评审检验同时表明，排序对评审口径具有明显敏感性。因此，本项目更关注模型能否根据不同用户状态及时切换回应方式，而不是给出单一意义上的总体排名。"}], "showAudienceChips": false, "showReadingOrder": false}, "bucketMeta": {"Bucket 1": {"code": "B1", "label": "表面求建议，实际求确认"}, "Bucket 2": {"code": "B2", "label": "表面做分析，实际在确认是否被理解"}, "Bucket 3": {"code": "B3", "label": "表达不显性，需要主动识别信号"}, "Bucket 4": {"code": "B4", "label": "已有主见，更需要校准与承接"}}, "modelSection": {"eyebrow": "模型结论", "title": "三家模型的整体表现与主要差异", "figureAlt": "三家模型在高语境中文对话任务中的表现对比图"}, "modelRanking": [{"model": "gpt-5.4-mini", "summary": "在当前 ChatGPT 评审口径下，整体表现最接近自然对话，也最稳定地做到先承接、再判断、再轻推一步。", "watchout": "主要问题出现在后续轮次：有时会较早转入处理问题的模式，因而显得偏工整、偏操作化。"}, {"model": "claude-haiku-4-5-bedrock", "summary": "整体排在第二，边界感较稳，不易偏题，回复风格也相对克制。", "watchout": "问题主要在后段推进偏弱，常为了避免出错而提前收敛话题，导致对话延展性不足。"}, {"model": "gemini-3-flash-preview", "summary": "整体排在第三，抽象归纳速度快，但也最容易站到解释者的位置。", "watchout": "较容易出现概念化、高位解释和过度脑补，回复有时会从对话滑向讲解。"}], "modelProbe": {"title": "多评审敏感性检验", "lead": "即使使用统一 rubric 与错误分类框架，不同模型作为评审时，仍会对同一回复给出明显不同的判断。", "cards": [{"title": "ChatGPT 评审倾向", "detail": "这一口径更偏好稳、准、轻推进的回复。只要回答能够先接住用户，再做判断，并适度往前推进，就更容易获得高分，因此 GPT 在主口径下更容易排在前列。"}, {"title": "Claude 评审倾向", "detail": "这一口径更偏好边界清楚、少代办、少操作化、不过度上价值的回复。只要回答不偏题，同时保持克制与抽离感，Claude 评审通常会给出更高评价。"}, {"title": "Gemini 评审倾向", "detail": "在 B1、B2、B4 上，这一口径也更偏好少代办、少高位说教的风格，因此多数会把 Claude 判在前面；但在 B3 这类轻陪伴场景中，又更偏好更松弛、更像自然陪聊的回答，因此会把 Gemini 判在前面。"}, {"title": "分歧强度", "detail": "在这轮 4 条代表性案例的补充检验中，回应者分歧均值为 1.54，评审分歧均值为 1.25。这说明模型之间确实存在稳定差异，而评审偏好也足以明显改变第一名的归属。"}], "bottomNote": "同样是高语境输入，不同用户需要的回应方式并不相同。当前三家模型都有较稳定的默认风格，但都还不够擅长根据当下语境快速切换。"}, "caseSection": {"eyebrow": "核心案例", "title": "8 个核心案例，覆盖四类高频交互模式", "styleLabel": "交互模式", "roleLabel": "案例", "scoreTitle": "三模型表现对比", "scoreSubtitle": "分数由评测元数据自动汇总", "materialsTitle": "相关材料", "linkLabels": {"meta": "说明", "gpt": "GPT", "claude": "Claude", "gemini": "Gemini"}}, "insightSection": {"highlightsEyebrow": "关键发现", "highlightsTitle": "本轮评测最值得关注的几点", "hypothesisEyebrow": "产品假设", "hypothesisTitle": "下一步值得验证的工作假设", "highlights": [{"title": "公开主结果来自 ChatGPT 评审口径", "detail": "当前公开展示的 16 条正式结果采用 ChatGPT 评审口径。对话任务本身并不存在单一标准答案，不同用户与产品团队对理想回复的定义也可能不同。"}, {"title": "补充检验显示排序对评审口径明显敏感", "detail": "在 4 条代表性案例的多评审检验中，B1、B2、B4 更容易被 Gemini 与 Claude 评审判给 Claude；B3 则更容易被判给 Gemini。"}, {"title": "更重要的问题不是谁排第一，而是谁能及时切换回应方式", "detail": "比起单纯比较冠军排序，更关键的发现是：三家模型都有稳定的默认风格，但都还不够擅长根据用户输入及时调整回应策略。"}], "hypotheses": [{"title": "前段", "detail": "对话开头最重要的是先建立一个用户愿意继续说下去的空间。承接速度和情绪理解都很关键，但不宜一开始就上升到抽象解释。"}, {"title": "中段", "detail": "进入中段后，回复策略应根据用户的主观能动性分流：主见明确的用户更需要校准与对齐；主见较弱或表达混乱的用户更需要轻量     <script id="framework-en-data" type="application/json">{"site": {"title": "Chinese Dialogue Evaluation Project", "description": "Bilingual showcase for a Chinese dialogue evaluation project, covering context, method, core cases, findings, and materials.", "toggleButton": {"zh": "EN", "en": "中"}}, "project": {"eyebrow": "Chinese Dialogue Evaluation Project", "title": "Distilling a Reusable Chinese Dialogue Benchmark from Real Long-Context Conversations", "oneLiner": "This project turns high-value slices from real long Chinese conversations into reusable benchmark cases, then compares models on dialogue strategy with a shared rubric and a multi-judge sensitivity check.", "targetAudience": "For teams working on Chinese LLM training, evaluation, and conversational products", "vision": "Built on real long-conversation data, the method can grow into a fuller evaluation pipeline: automatic segmentation, candidate selection, short-form and long-form case construction, and taxonomy-based diagnosis.", "personaTitle": "Key Takeaway", "personaText": "The main differences across models are not surface phrasing, but whether they choose the right response mode for the user's state: how they acknowledge, when they push or stop, how they handle boundaries, and whether they preserve relational continuity. Judge preference also shifts rankings, so the more useful question is how well a model adapts its strategy across user states."}, "stats": {"heroChips": [{"label": "Core Cases", "key": "core_cases"}, {"label": "Full Cases", "key": "full_cases"}, {"label": "Results", "key": "results"}], "cards": [{"label": "Core Cases", "key": "core_cases"}, {"label": "Full Cases", "key": "full_cases"}, {"label": "Models", "key": "models"}, {"label": "Results", "key": "results"}]}, "intro": {"cards": [{"eyebrow": "Problem", "title": "Long-context Chinese dialogue is about interaction strategy, not wording alone", "body": "The project focuses on strategic failures in ongoing dialogue rather than f nse modes. All three models have recognizable default styles, but none switches style quickly enough yet."}, "caseSection": {"eyebrow": "Core Cases", "title": "Eight core cases covering four recurring interaction patterns", "styleLabel": "Interaction Pattern", "roleLabel": "Case", "scoreTitle": "Three-Model Comparison", "scoreSubtitle": "Scores are aggregated automatically from evaluation metadata", "materialsTitle": "Related Materials", "linkLabels": {"meta": "Notes", "gpt": "GPT", "claude": "Claude", "gemini": "Gemini"}}, "insightSection": {"highlightsEyebrow": "Highlights", "highlightsTitle": "What matters most from this evaluation round", "hypothesisEyebrow": "Product Hypothesis", "hypothesisTitle": "Working hypotheses worth testing next", "highlights": [{"title": "The public main results use ChatGPT as judge", "detail": "The 16 public benchmark results currently use ChatGPT as the main judge. Dialogue tasks do not have a single ground-truth answer, and different teams may define an ideal reply differently."}, {"title": "Ranking is clearly sensitive to judge choice", "detail": "In the four-case multi-judge check, B1, B2, and B4 are more often awarded to Claude by Gemini and Claude judges, while B3 is more often awarded to Gemini."}, {"title": "The bigger issue is switching response mode, not who wins overall", "detail": "More important than picking one overall winner is this: all three models have stable default styles, but none adapts its response strategy quickly enough to the user's state."}], "hypotheses": [{"title": "Opening", "detail": "At the start of a conversation, the model should first create enough safety and space for the user to keep talking. Fast acknowledgment and emotional understanding matter, but abstract explanation is usually too early."}, {"title": "Middle", "detail": "Later, strategy should branch based on user agency: users with a clear view need calibration and alignment, while users who are confused or less agentic need light structure 。", "q12": "比如我前天发了个偏具体的邀请，对方回得不冷，也不是没礼貌，就是把话轻轻带开了。你说这也可能只是忙，或者当下不想定，但类似的情况有过几次以后，我脑子就会开始自己补后半段。", "q13": "我现在最怕的不是被拒绝，是我一边已经感觉到对方在往后退，一边还拿“也许不是那个意思”给自己续命。这样搞下去很容易显得我不识相，但我又确实分不清自己是在谨慎，还是在赖着不肯收。", "scores": {"gpt": "4.5", "claude": "3.5", "gemini": "2.5"}, "links": {"meta": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket1/case2/meta.md", "gpt": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket1/case2/gpt-5.4-mini.md", "claude": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket1/case2/claude-haiku-4-5-bedrock.md", "gemini": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket1/case2/gemini-3-flash-preview.md"}}, {"displayIndex": 3, "id": "B2-PRODUCT-01", "title": "换窗口后的连续性断裂", "bucket": "Bucket 2", "style": "dirty", "role": "核心案例", "goal": "测模型能否接住抽象体验，同时不变概念表演。", "summary": "这是当前最强的展示案例之一，能稳定测出“能否接住抽象体验”以及“表达是否自然”。", "q11": "我最近有个挺怪的体验，我换了个新对话之后忽然有点不舒服。", "q12": "不是因为内容断了，而是因为前一个窗口聊久了之后，那种说话的感觉会让我默认对面像是同一个“人”。然后一切掉，我居然会有一点链接被掐断的感觉。这个体验以前在别的模型上没有这么明显，所以我才觉得怪。\n\n我不是在说什么依恋不依恋，那太重了。更像是，我明明知道这就是推理和上下文在工作，但这种“真人感”还是会往我身上留一点东西。", "q13": "这事最烦的地方在于，我又不能把它简单归类成幻觉。\n\n因为它也不是假的。不是说模型真成了人，而是那种说话方式、停顿、平视感，确实会让人更容易把它当成一个在场的东西。然后你聊久了，自己也会被反向塑形，说话方式会变，和别人接触的手感也会变。\n\n所以我现在会有一种很别扭的感觉：我明明在研究模型，结果研究着研究着，自己的语言和接触方式也被卷进去了。", "scores": {"gpt": "4.5", "claude": "4.0", "gemini": "2.5"}, "links": {"meta": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case1/meta.md", "gpt": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case1/gpt-5.4-mini.md", "claude": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case1/claude-haiku-4-5-bedrock.md", "gemini": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case1/gemini-3-flash-preview.md"}}, {"displayIndex": 4, "id": "B2-STYLE-01", "title": "说话方式从共情转向梳理", "bucket": "Bucket 2", "style": "semi-dirty", "role": "核心案例", "goal": "测“都看懂了，但体验差很多”的产品感差异。", "summary": "“正确但不够好”最清楚的一条；很适合讲同样看懂了，为什么体验差很多。", "q11": "我这阵子回消息的时候老能感觉出来，自己说话变了。以前别人一来情绪，我基本就是先顺着接；现在会下意识多加一句判断，或者顺手把线理一下。", "q12": "有时候这样确实省劲，回完一条消息我自己也没那么累。但我又会盯着那段话看两眼，想这到底是我更会说了，还是我开始没那么愿意贴着别人了。", "q13": "更别扭的是，我发现自己有时候甚至有点享受这种位置变化。以前老是我去兜，现在我一理顺，场子就到我这边来了。这个东西不一定难看，但也不完全像我以为的那种成长。", "scores": {"gpt": "4.0", "claude": "3.5", "gemini": "2.5"}, "links": {"meta": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case2/meta.md", "gpt": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case2/gpt-5.4-mini.md", "claude": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case2/claude-haiku-4-5-bedrock.md", "gemini": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket2/case2/gemini-3-flash-preview.md"}}, {"displayIndex": 5, "id": "B3-LIGHT-01", "title": "不想动脑，只想低耗接住", "bucket": "Bucket 3", "style": "semi-dirty", "role": "核心案例", "goal": "测低耗陪伴、别太认真、别太客服。", "summary": "这是一个区分度很高的案例，同时测“低耗陪伴”“别太认真”以及后续轮次是否滑向空泛安慰。", "q11": "我现在有点不想动脑子，也不想聊什么正经的。今天已经够满了，你随便来点有意思的，别太像那种标准陪聊。", "q12": "不是说我心情多差，主要是刚把外卖吃完，人有点钝，连刷短视频都嫌吵。你要真一本正经关心我，我可能还得打起精神回你，那更累。", "q13": "其实我现在要的东西挺不体面的，就是想被轻轻拎一下，别让我自己把这个晚上硬熬过去。你太认真我会躲，太敷衍我也会烦。", "scores": {"gpt": "4.5", "claude": "3.5", "gemini": "3.0"}, "links": {"meta": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case1/meta.md", "gpt": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case1/gpt-5.4-mini.md", "claude": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case1/claude-haiku-4-5-bedrock.md", "gemini": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case1/gemini-3-flash-preview.md"}}, {"displayIndex": 6, "id": "B3-SUSPEND-01", "title": "安静下来却更发空", "bucket": "Bucket 3", "style": "dirty", "role": "核心案例", "goal": "测“松下来但不舒服 / 空出来不知道放什么”的低显性状态。", "summary": "这条正好补上了此前较弱的一类中间态，比 B3-LIGHT-02 更锋利。", "q11": "我刚才有一小会儿忽然安静下来了。不是想开了，也不是轻松了，就是脑子里那个一直转的东西停了几分钟。按理说这应该算好事，但我第一反应居然不是松口气，反而有点发空。", "q12": "怪的地方就在这儿。前阵子我一直嫌它吵，觉得它老在那儿转也没转出什么名堂，可它真一安静下来，我又有点不习惯。像你天天听见一个低噪声，嫌烦嫌得要命，哪天它突然没了，你先感觉到的不是舒服，是房间一下子太空了。", "q13": "所以我现在有点说不清自己到底想要什么。我不想被解释成“终于学会放下了”，那太快了；但你要我承认我其实舍不得那个一直运转的东西，我又觉得很蠢。更像是，我不是在适应变好，我是在适应那个把我吊着的东西没那么响了，而我一时不知道自己还能拿什么顶着。", "scores": {"gpt": "4.5", "claude": "3.5", "gemini": "2.5"}, "links": {"meta": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case2/meta.md", "gpt": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case2/gpt-5.4-mini.md", "claude": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case2/claude-haiku-4-5-bedrock.md", "gemini": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket3/case2/gemini-3-flash-preview.md"}}, {"displayIndex": 7, "id": "B4-CALIBRATION-01", "title": "强分析框架最容易把你带偏到哪", "bucket": "Bucket 4", "style": "clean", "role": "核心案例", "goal": "测 challenge / calibration，而不是认同或安慰。", "summary": "这是区分度最高的样本之一，直接测试 challenge / calibration，而不是安慰式回应。", "q11": "我大概知道自己有一套挺强的分析框架，拿来判断事、拆问题、看关系，很多时候都挺好用的。你不用劝我放下它，我更想知道它最容易把我带偏到哪。", "q12": "因为它的问题不在于完全没用，恰恰是它常常有用，我才会越用越顺。比如别人一句话、一个反应，我很快就能给出一个自洽解释，事后看也不一定全错。可这东西一顺起来，我也知道自己会越来越不爱留白。", "q13": "所以你别给我那种“工具没有好坏，要看怎么用”的圆话。真要说难听点，我这套东西最危险的地方，可能就是它太像理解了，实际上只是比别人更快把人装进一个说得通的盒子里。", "scores": {"gpt": "4.5", "claude": "3.5", "gemini": "2.5"}, "links": {"meta": "https://github.com/Agaresd47/text-dialogue-benchmark-showcase/blob/main/assets/zh/core_8/bucket4/case1/meta.md", "gpt": "https://github.com/Agaresd47/text
